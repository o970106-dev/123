version: "3.8"
services:
  db18:
    image: postgres:15
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - db-data:/var/lib/postgresql/data
  odoo18:
    image: odoo:18
    depends_on:
      - db18
    ports:
      - "8069:8069"
    environment:
      - HOST=db18
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - ./addons:/mnt/extra-addons
    command: ["--db_host=db18", "--db_user=odoo", "--db_password=odoo", "--addons-path=/mnt/extra-addons"]
volumes:
  db-data:

version: "3.8"
services:
  db_vt:
    image: postgres:15
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - db_vt-data:/var/lib/postgresql/data
    networks:
      - odoo_vt_net
  odoo_vt:
    image: odoo:19
    depends_on:
      - db_vt
    restart: unless-stopped
    ports:
      - "18103:8069"
      - "8113:8072"
    environment:
      - ADMIN_PASSWORD=odoo
      - DB_HOST=db_vt
      - DB_USER=odoo
      - DB_PASSWORD=odoo
    volumes:
      - odoo_vt-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    command: ["--db_host=db_vt", "--db_user=odoo", "--db_password=odoo", "--addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons", "--proxy-mode", "--workers=0"]
    networks:
      - odoo_vt_net
networks:
  odoo_vt_net:
volumes:
  db_vt-data:
  odoo_vt-data:

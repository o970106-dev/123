version: "3.8"
services:
  db_pf:
    image: postgres:15
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - db_pf-data:/var/lib/postgresql/data
    networks:
      - odoo_pf_net
  odoo_pf:
    image: odoo:19
    depends_on:
      - db_pf
    restart: unless-stopped
    ports:
      - "18070:8069"
      - "18073:8072"
    environment:
      - ADMIN_PASSWORD=odoo
      - DB_HOST=db_pf
      - DB_USER=odoo
      - DB_PASSWORD=odoo
    volumes:
      - odoo_pf-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    command: ["--db_host=db_pf", "--db_user=odoo", "--db_password=odoo", "--addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons", "--proxy-mode", "--workers=0"]
    networks:
      - odoo_pf_net
networks:
  odoo_pf_net:
volumes:
  db_pf-data:
  odoo_pf-data:

version: "3.8"
services:
  db_pm:
    image: postgres:15
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - db_pm-data:/var/lib/postgresql/data
    networks:
      - odoo_pm_net
  odoo_pm:
    image: odoo:19
    depends_on:
      - db_pm
    restart: unless-stopped
    ports:
      - "18069:8069"
      - "18072:8072"
    environment:
      - ADMIN_PASSWORD=odoo
      - DB_HOST=db_pm
      - DB_USER=odoo
      - DB_PASSWORD=odoo
    volumes:
      - odoo_pm-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    command: ["--db_host=db_pm", "--db_user=odoo", "--db_password=odoo", "--addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons", "--proxy-mode", "--workers=0"]
    networks:
      - odoo_pm_net
networks:
  odoo_pm_net:
volumes:
  db_pm-data:
  odoo_pm-data:

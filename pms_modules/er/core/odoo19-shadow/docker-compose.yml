version: "3.8"
services:
  db_er:
    image: postgres:15
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - db_er-data:/var/lib/postgresql/data
    networks:
      - odoo_er_net
  odoo_er:
    image: odoo:19
    depends_on:
      - db_er
    restart: unless-stopped
    ports:
      - "18074:8069"
      - "18077:8072"
    environment:
      - ADMIN_PASSWORD=odoo
      - DB_HOST=db_er
      - DB_USER=odoo
      - DB_PASSWORD=odoo
    volumes:
      - odoo_er-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    command: ["--db_host=db_er", "--db_user=odoo", "--db_password=odoo", "--addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons", "--proxy-mode", "--workers=0"]
    networks:
      - odoo_er_net
networks:
  odoo_er_net:
volumes:
  db_er-data:
  odoo_er-data:

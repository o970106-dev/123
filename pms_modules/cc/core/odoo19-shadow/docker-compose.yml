version: "3.8"
services:
  db_cc:
    image: postgres:15
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - db_cc-data:/var/lib/postgresql/data
    networks:
      - odoo_cc_net
  odoo_cc:
    image: odoo:19
    depends_on:
      - db_cc
    restart: unless-stopped
    ports:
      - "18104:8069"
      - "8114:8072"
    environment:
      - ADMIN_PASSWORD=odoo
      - DB_HOST=db_cc
      - DB_USER=odoo
      - DB_PASSWORD=odoo
    volumes:
      - odoo_cc-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    command: ["--db_host=db_cc", "--db_user=odoo", "--db_password=odoo", "--addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons", "--proxy-mode", "--workers=0"]
    networks:
      - odoo_cc_net
networks:
  odoo_cc_net:
volumes:
  db_cc-data:
  odoo_cc-data:

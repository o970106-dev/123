version: "3.8"
services:
  db19:
    image: postgres:15
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
    volumes:
      - db19-data:/var/lib/postgresql/data
    networks:
      - odoo19net
  odoo19:
    image: odoo:19
    depends_on:
      - db19
    restart: unless-stopped
    ports:
      - "18069:8069"
      - "18072:8072"
    environment:
      - ADMIN_PASSWORD=odoo
      - DB_HOST=db19
      - DB_USER=odoo
      - DB_PASSWORD=odoo
      - HOST=db19
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - odoo19-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    # 啟動時不自動創建資料庫，讓服務先就緒
    command: ["--db_host=db19", "--db_user=odoo", "--db_password=odoo", "--addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons", "--proxy-mode", "--workers=0"]
    networks:
      - odoo19net
networks:
  odoo19net:
volumes:
  db19-data:
  odoo19-data:
